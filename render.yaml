services:
  # 1. Base de datos PostgreSQL
  - type: psql
    name: brightview-db
    plan: free # Puedes usar free para empezar
    region: ohio
    databaseName: brightview
    user: admin

  # 2. API Backend en NestJS
  - type: web
    name: brightview-api
    env: node
    plan: free # Puedes usar free para empezar
    region: ohio
    buildCommand: "npm install && npx prisma generate && npx prisma db push && npm run build"
    startCommand: "npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brightview-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
